<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoors Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/11/firebase-firestore.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCHLIaIjQkEx-oKUF4JawU35OrT1i6ql1E",
            authDomain: "outdoors-b944e.firebaseapp.com",
            projectId: "outdoors-b944e",
            storageBucket: "outdoors-b944e.firebasestorage.app",
            messagingSenderId: "904169939979",
            appId: "1:904169939979:web:b03d567bb23befd403130e"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Make available globally
        window.firebaseDb = db;
        window.firebaseCollection = collection;
        window.firebaseAddDoc = addDoc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseDeleteDoc = deleteDoc;
        window.firebaseDoc = doc;
        window.firebaseOnSnapshot = onSnapshot;
        window.firebaseQuery = query;
        window.firebaseOrderBy = orderBy;
        window.firebaseServerTimestamp = serverTimestamp;
    </script>
    <script src="app.js"></script>
</head>
<body>
    <div class="app">
        <header>
            <h1>🥾 Outdoors Dashboard</h1>
            <div class="header-actions">
                <button id="addBtn" class="btn-primary" style="display:none">+ Add Activity</button>
            </div>
        </header>

        <div id="loginPrompt" class="login-prompt" style="display:none">
            <h2>Welcome to Outdoors Dashboard</h2>
            <p>Track your outdoor activities.</p>
        </div>

        <section class="stats-grid" id="statsSection" style="display:none">
            <div class="stat-card">
                <span class="stat-value" id="totalHikes">0</span>
                <span class="stat-label">Total Activities</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="totalMiles">0</span>
                <span class="stat-label">Total Miles</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="totalElevation">0</span>
                <span class="stat-label">Elevation (ft)</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="currentStreak">0</span>
                <span class="stat-label">Day Streak</span>
            </div>
        </section>

        <section class="goals-section" id="goalsSection" style="display:none">
            <h2>Goals</h2>
            <div class="goals-row">
                <div class="goal">
                    <span class="goal-label">2026 Miles</span>
                    <div class="goal-bar"><div class="goal-fill" id="yearProgress"></div></div>
                    <span class="goal-value" id="yearMiles">0 / 100</span>
                </div>
                <div class="goal">
                    <span class="goal-label">This Month</span>
                    <div class="goal-bar"><div class="goal-fill" id="monthProgress"></div></div>
                    <span class="goal-value" id="monthMiles">0 / 20</span>
                </div>
            </div>
        </section>

        <section class="filters" id="filtersSection" style="display:none">
            <input type="text" id="search" placeholder="Search...">
            <select id="filterDifficulty">
                <option value="">All Types</option>
                <option value="Hike">Hike</option>
                <option value="Bike">Bike</option>
                <option value="Run">Run</option>
                <option value="Climb">Climb</option>
                <option value="Water">Water</option>
            </select>
            <select id="sortBy">
                <option value="date">Sort by Date</option>
                <option value="miles">Sort by Miles</option>
                <option value="rating">Sort by Rating</option>
            </select>
        </section>

        <section class="hikes-list" id="hikesList"></section>
    </div>

    <div class="modal" id="hikeModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle">Add Activity</h2>
            <form id="hikeForm">
                <input type="hidden" id="hikeId">
                
                <div class="form-row">
                    <label>Activity Name *</label>
                    <input type="text" id="trailName" required>
                </div>
                
                <div class="form-row">
                    <label>Type</label>
                    <select id="difficulty">
                        <option value="Hike">Hike</option>
                        <option value="Bike">Bike</option>
                        <option value="Run">Run</option>
                        <option value="Climb">Climb</option>
                        <option value="Water">Water</option>
                    </select>
                </div>
                
                <div class="form-row">
                    <label>Location</label>
                    <input type="text" id="location">
                </div>
                
                <div class="form-row">
                    <label>Date *</label>
                    <input type="date" id="date" required>
                </div>
                
                <div class="form-row-group">
                    <div class="form-row">
                        <label>Distance (miles)</label>
                        <input type="number" step="0.1" id="distance">
                    </div>
                    <div class="form-row">
                        <label>Elevation (ft)</label>
                        <input type="number" id="elevation">
                    </div>
                </div>
                
                <div class="form-row-group">
                    <div class="form-row">
                        <label>Duration</label>
                        <input type="text" id="duration" placeholder="e.g., 2h 30m">
                    </div>
                    <div class="form-row">
                        <label>Difficulty</label>
                        <select id="difficulty2">
                            <option value="Easy">Easy</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Hard">Hard</option>
                            <option value="Expert">Expert</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <label>Weather</label>
                    <input type="text" id="weather" placeholder="e.g., Sunny, 65°F">
                </div>
                
                <div class="form-row">
                    <label>Rating</label>
                    <div class="rating-input">
                        <input type="radio" name="rating" value="1"><label>⭐</label>
                        <input type="radio" name="rating" value="2"><label>⭐⭐</label>
                        <input type="radio" name="rating" value="3"><label>⭐⭐⭐</label>
                        <input type="radio" name="rating" value="4"><label>⭐⭐⭐⭐</label>
                        <input type="radio" name="rating" value="5" checked><label>⭐⭐⭐⭐⭐</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <label>Gear</label>
                    <textarea id="gear" rows="2" placeholder="Gear used..."></textarea>
                </div>
                
                <div class="form-row">
                    <label>Notes</label>
                    <textarea id="notes" rows="3" placeholder="Conditions, wildlife, etc."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
