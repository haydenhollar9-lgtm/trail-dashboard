<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoors Dashboard</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
:root {
    --bg: #1a1a2e;
    --card: #16213e;
    --card-hover: #1f2b47;
    --accent: #e94560;
    --accent-hover: #ff6b6b;
    --text: #eaeaea;
    --text-muted: #8b8b9a;
    --border: #2a2a4a;
}
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
}
.app { max-width: 1200px; margin: 0 auto; }
header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
h1 { font-size: 1.8rem; font-weight: 700; }
h2 { font-size: 1.2rem; margin-bottom: 15px; color: var(--text-muted); }
.btn-primary { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; cursor: pointer; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
.stat-card { background: var(--card); padding: 25px; border-radius: 12px; text-align: center; border: 1px solid var(--border); }
.stat-value { display: block; font-size: 2.5rem; font-weight: 700; color: var(--accent); }
.stat-label { display: block; font-size: 0.9rem; color: var(--text-muted); margin-top: 5px; }
.goals-section { background: var(--card); padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid var(--border); }
.goals-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
.goal-label { font-size: 0.9rem; color: var(--text-muted); }
.goal-bar { height: 10px; background: var(--border); border-radius: 5px; margin: 10px 0; overflow: hidden; }
.goal-fill { height: 100%; background: var(--accent); border-radius: 5px; width: 0%; }
.goal-value { font-size: 0.85rem; color: var(--text-muted); }
.filters { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
.filters input, .filters select { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 8px; }
.filters input { flex: 1; min-width: 200px; }
.hikes-list { display: grid; gap: 15px; }
.hike-card { background: var(--card); border-radius: 12px; padding: 20px; border: 1px solid var(--border); }
.hike-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.hike-meta { display: flex; gap: 20px; flex-wrap: wrap; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 10px; }
.hike-stats { display: flex; gap: 15px; font-size: 0.9rem; flex-wrap: wrap; }
.hike-actions { margin-top: 15px; }
.hike-actions button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; margin-right: 10px; }
.btn-small { background: var(--border); color: var(--text); }
.btn-danger { background: #7f1d1d; color: #fca5a5; }
.difficulty-easy { color: #4ade80; }
.difficulty-moderate { color: #fbbf24; }
.difficulty-hard { color: #f97316; }
.difficulty-expert { color: #fca5a5; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
.modal-content { background: var(--bg); padding: 30px; border-radius: 16px; width: 100%; max-width: 600px; margin: 50px auto; border: 1px solid var(--border); }
.close { float: right; font-size: 1.5rem; cursor: pointer; }
.form-row { margin-bottom: 15px; }
.form-row label { display: block; margin-bottom: 5px; color: var(--text-muted); }
.form-row input, .form-row select, .form-row textarea { width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 8px; }
.form-row-group { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
.form-actions { display: flex; gap: 15px; justify-content: flex-end; margin-top: 20px; }
    </style>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        firebase.initializeApp({
            apiKey: "AIzaSyCHLIaIjQkEx-oKUF4JawU35OrT1i6ql1E",
            authDomain: "outdoors-b944e.firebaseapp.com",
            projectId: "outdoors-b944e",
            storageBucket: "outdoors-b944e.firebasestorage.app",
            messagingSenderId: "904169939979",
            appId: "1:904169939979:web:b03d567bb23befd403130e"
        });
        var db = firebase.firestore();
    </script>
</head>
<body>
    <div class="app">
        <header>
            <h1>🥾 Outdoors Dashboard</h1>
            <button id="addBtn" class="btn-primary">+ Add Activity</button>
        </header>

        <section class="stats-grid">
            <div class="stat-card"><span class="stat-value" id="totalHikes">0</span><span class="stat-label">Total Activities</span></div>
            <div class="stat-card"><span class="stat-value" id="totalMiles">0</span><span class="stat-label">Total Miles</span></div>
            <div class="stat-card"><span class="stat-value" id="totalElevation">0</span><span class="stat-label">Elevation (ft)</span></div>
            <div class="stat-card"><span class="stat-value" id="currentStreak">0</span><span class="stat-label">Day Streak</span></div>
        </section>

        <section class="goals-section">
            <h2>Goals</h2>
            <div class="goals-row">
                <div><span class="goal-label">2026 Miles</span><div class="goal-bar"><div class="goal-fill" id="yearProgress"></div></div><span class="goal-value" id="yearMiles">0 / 100</span></div>
                <div><span class="goal-label">This Month</span><div class="goal-bar"><div class="goal-fill" id="monthProgress"></div></div><span class="goal-value" id="monthMiles">0 / 20</span></div>
            </div>
        </section>

        <section class="filters">
            <input type="text" id="search" placeholder="Search..." style="flex:1;min-width:200px;background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;">
            <select id="filterDifficulty" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;">
                <option value="">All Types</option>
                <option value="Hike">Hike</option><option value="Bike">Bike</option><option value="Run">Run</option>
                <option value="Climb">Climb</option><option value="Water">Water</option>
            </select>
            <select id="sortBy" style="background:var(--card);border:1px solid var(--border);color:var(--text);padding:12px;border-radius:8px;">
                <option value="date">Sort by Date</option>
                <option value="miles">Sort by Miles</option>
                <option value="rating">Sort by Rating</option>
            </select>
        </section>

        <section class="hikes-list" id="hikesList"></section>
    </div>

    <div class="modal" id="hikeModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle">Add Activity</h2>
            <form id="hikeForm">
                <input type="hidden" id="hikeId">
                <div class="form-row"><label>Activity Name *</label><input type="text" id="trailName" required></div>
                <div class="form-row-group">
                    <div class="form-row"><label>Type</label><select id="activityType"><option value="Hike">Hike</option><option value="Bike">Bike</option><option value="Run">Run</option><option value="Climb">Climb</option><option value="Water">Water</option></select></div>
                    <div class="form-row"><label>Date *</label><input type="date" id="date" required></div>
                </div>
                <div class="form-row"><label>Location</label><input type="text" id="location"></div>
                <div class="form-row-group">
                    <div class="form-row"><label>Distance (miles)</label><input type="number" step="0.1" id="distance"></div>
                    <div class="form-row"><label>Elevation (ft)</label><input type="number" id="elevation"></div>
                </div>
                <div class="form-row-group">
                    <div class="form-row"><label>Duration</label><input type="text" id="duration" placeholder="e.g., 2h 30m"></div>
                    <div class="form-row"><label>Difficulty</label><select id="difficulty"><option value="Easy">Easy</option><option value="Moderate">Moderate</option><option value="Hard">Hard</option><option value="Expert">Expert</option></select></div>
                </div>
                <div class="form-row"><label>Weather</label><input type="text" id="weather" placeholder="e.g., Sunny, 65°F"></div>
                <div class="form-row"><label>Notes</label><textarea id="notes" rows="2"></textarea></div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
var hikes = [];
var sampleTrails = [
    { trailName: "Alum Cave Trail", location: "Great Smoky Mountains NP", distance: 5, elevation: 1150, difficulty: "Moderate", type: "Hike", rating: 5, notes: "Beautiful arch" },
    { trailName: "Abrams Falls", location: "Great Smoky Mountains NP", distance: 5, elevation: 780, difficulty: "Moderate", type: "Hike", rating: 5, notes: "Waterfall" },
    { trailName: "Grotto Falls", location: "Roaring Fork", distance: 2.6, elevation: 400, difficulty: "Easy", type: "Hike", rating: 4, notes: "Behind waterfall" },
    { trailName: "Clingmans Dome", location: "Great Smoky Mountains NP", distance: 1.3, elevation: 330, difficulty: "Moderate", type: "Hike", rating: 4, notes: "Highest point" },
    { trailName: "Charlies Bunion", location: "Great Smoky Mountains NP", distance: 4.2, elevation: 900, difficulty: "Moderate", type: "Hike", rating: 5, notes: "Rocky outcrop" }
];

db.collection('hikes').orderBy('date', 'desc').onSnapshot(function(snapshot) {
    hikes = [];
    snapshot.forEach(function(doc) {
        hikes.push({ id: doc.id, data: doc.data() });
    });
    if (hikes.length === 0) seedData(); else renderAll();
}, function(err) { console.error(err); });

function seedData() {
    sampleTrails.forEach(function(trail) {
        db.collection('hikes').add({
            trailName: trail.trailName, location: trail.location, distance: trail.distance,
            elevation: trail.elevation, difficulty: trail.difficulty, type: trail.type || 'Hike',
            rating: trail.rating, notes: trail.notes, date: '2026-03-01', duration: Math.ceil(trail.distance/2) + 'h',
            weather: "Clear, 65°F", gear: "Boots, water", createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
    });
}

function renderAll() { renderStats(); renderGoals(); renderHikes(); }

function renderStats() {
    var totalHikes = hikes.length;
    var totalMiles = hikes.reduce(function(s,h){return s+(parseFloat(h.data.distance)||0);},0);
    var totalElevation = hikes.reduce(function(s,h){return s+(parseInt(h.data.elevation)||0);},0);
    document.getElementById('totalHikes').textContent = totalHikes;
    document.getElementById('totalMiles').textContent = totalMiles.toFixed(1);
    document.getElementById('totalElevation').textContent = totalElevation.toLocaleString();
    document.getElementById('currentStreak').textContent = '1';
}

function renderGoals() {
    document.getElementById('yearMiles').textContent = '0 / 100';
    document.getElementById('monthMiles').textContent = '0 / 20';
}

function renderHikes() {
    var container = document.getElementById('hikesList');
    container.innerHTML = hikes.map(function(h) {
        var d = h.data;
        return '<div class="hike-card"><div><div class="hike-header"><h3>'+d.trailName+'</h3></div><div class="hike-meta"><span>📍 '+d.location+'</span><span>📅 '+(d.date||'N/A')+'</span><span>'+(d.type||'Hike')+'</span></div><div class="hike-stats"><span>🥾 '+(d.distance||'?')+' mi</span><span>⛰️ '+(d.elevation||'?')+' ft</span><span>⏱️ '+(d.duration||'?')+'</span><span class="difficulty-'+(d.difficulty||'').toLowerCase()+'">'+d.difficulty+'</span></div></div><div class="hike-actions"><button class="btn-small" onclick="editHike(\''+h.id+'\')">Edit</button><button class="btn-small btn-danger" onclick="deleteHike(\''+h.id+'\')">Delete</button></div></div>';
    }).join('') || '<p style="text-align:center;color:var(--text-muted);padding:40px;">No activities yet. Click "+ Add Activity" to get started!</p>';
}

document.getElementById('addBtn').onclick = function() { openModal(); };
document.getElementById('closeModal').onclick = closeModal;
document.getElementById('cancelBtn').onclick = closeModal;
document.getElementById('hikeForm').onsubmit = handleSubmit;
document.getElementById('search').oninput = renderHikes;
document.getElementById('filterDifficulty').onchange = renderHikes;
document.getElementById('sortBy').onchange = renderHikes;

function openModal(id) {
    document.getElementById('hikeForm').reset();
    document.getElementById('hikeId').value = '';
    if(id){var h=hikes.find(function(x){return x.id===id;});if(h){var d=h.data;document.getElementById('hikeId').value=id;document.getElementById('trailName').value=d.trailName;document.getElementById('activityType').value=d.type||'Hike';document.getElementById('location').value=d.location;document.getElementById('date').value=d.date;document.getElementById('distance').value=d.distance;document.getElementById('elevation').value=d.elevation;document.getElementById('duration').value=d.duration;document.getElementById('difficulty').value=d.difficulty||'Easy';document.getElementById('weather').value=d.weather;document.getElementById('notes').value=d.notes;}}
    else{document.getElementById('date').value=new Date().toISOString().split('T')[0];}
    document.getElementById('modalTitle').textContent = id ? 'Edit Activity' : 'Add Activity';
    document.getElementById('hikeModal').style.display = 'block';
}
function closeModal(){document.getElementById('hikeModal').style.display='none';}
function handleSubmit(e){
    e.preventDefault();
    var id=document.getElementById('hikeId').value;
    var data={trailName:document.getElementById('trailName').value,type:document.getElementById('activityType').value,location:document.getElementById('location').value,date:document.getElementById('date').value,distance:parseFloat(document.getElementById('distance').value)||0,elevation:parseInt(document.getElementById('elevation').value)||0,duration:document.getElementById('duration').value,difficulty:document.getElementById('difficulty').value,weather:document.getElementById('weather').value,notes:document.getElementById('notes').value};
    if(id){db.collection('hikes').doc(id).update(data);}else{data.createdAt=firebase.firestore.FieldValue.serverTimestamp();db.collection('hikes').add(data);}
    closeModal();
}
function deleteHike(id){if(confirm('Delete?'))db.collection('hikes').doc(id).delete();}
window.editHike=openModal;
window.deleteHike=deleteHike;
    </script>
</body>
</html>
