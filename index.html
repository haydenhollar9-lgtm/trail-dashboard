<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outdoors Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>🥾 Outdoors Dashboard</h1>
            <div class="header-actions">
                <button id="addBtn" class="btn-primary" style="display:none">+ Add Activity</button>
            </div>
        </header>

        <section class="stats-grid" id="statsSection" style="display:none">
            <div class="stat-card">
                <span class="stat-value" id="totalHikes">0</span>
                <span class="stat-label">Total Activities</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="totalMiles">0</span>
                <span class="stat-label">Total Miles</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="totalElevation">0</span>
                <span class="stat-label">Elevation (ft)</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="currentStreak">0</span>
                <span class="stat-label">Day Streak</span>
            </div>
        </section>
    </div>

    <script>
        alert("INLINE JS WORKING!");
        document.getElementById('statsSection').style.display = 'grid';
        document.getElementById('addBtn').style.display = 'inline-block';
    </script>
</body>
</html>
