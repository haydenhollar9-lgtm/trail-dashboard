<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trail Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10/8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10/8.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10/8.0/firebase-auth.js";

        // Firebase config - REPLACE WITH YOUR OWN
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Make available globally
        window.firebaseDb = db;
        window.firebaseAuth = auth;
        window.firebaseProvider = provider;
        window.firebaseAddDoc = addDoc;
        window.firebaseUpdateDoc = updateDoc;
        window.firebaseDeleteDoc = deleteDoc;
        window.firebaseDoc = doc;
        window.firebaseOnSnapshot = onSnapshot;
        window.firebaseQuery = query;
        window.firebaseOrderBy = orderBy;
        window.firebaseServerTimestamp = serverTimestamp;
        window.firebaseSignIn = () => signInWithPopup(auth, provider);
        window.firebaseSignOut = () => signOut(auth);
        window.firebaseOnAuth = onAuthStateChanged;
    </script>
</head>
<body>
    <div class="app">
        <header>
            <h1>🥾 Trail Dashboard</h1>
            <div class="header-actions">
                <div id="authSection">
                    <button id="loginBtn" class="btn-primary">Sign In with Google</button>
                </div>
                <button id="addBtn" class="btn-primary" style="display:none">+ Add Hike</button>
                <button id="logoutBtn" class="btn-secondary" style="display:none">Sign Out</button>
            </div>
        </header>

        <div id="loginPrompt" class="login-prompt">
            <h2>Welcome to Trail Dashboard</h2>
            <p>Sign in to track your hikes and access from any device.</p>
            <button class="btn-primary" onclick="window.firebaseSignIn()">Sign In with Google</button>
        </div>

        <section class="stats-grid" id="statsSection" style="display:none">
            <div class="stat-card">
                <span class="stat-value" id="totalHikes">0</span>
                <span class="stat-label">Total Hikes</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="totalMiles">0</span>
                <span class="stat-label">Total Miles</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="totalElevation">0</span>
                <span class="stat-label">Elevation (ft)</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" id="currentStreak">0</span>
                <span class="stat-label">Day Streak</span>
            </div>
        </section>

        <section class="goals-section" id="goalsSection" style="display:none">
            <h2>Goals</h2>
            <div class="goals-row">
                <div class="goal">
                    <span class="goal-label">2026 Miles</span>
                    <div class="goal-bar"><div class="goal-fill" id="yearProgress"></div></div>
                    <span class="goal-value" id="yearMiles">0 / 100</span>
                </div>
                <div class="goal">
                    <span class="goal-label">This Month</span>
                    <div class="goal-bar"><div class="goal-fill" id="monthProgress"></div></div>
                    <span class="goal-value" id="monthMiles">0 / 20</span>
                </div>
            </div>
        </section>

        <section class="filters" id="filtersSection" style="display:none">
            <input type="text" id="search" placeholder="Search trails...">
            <select id="filterDifficulty">
                <option value="">All Difficulties</option>
                <option value="Easy">Easy</option>
                <option value="Moderate">Moderate</option>
                <option value="Hard">Hard</option>
                <option value="Expert">Expert</option>
            </select>
            <select id="sortBy">
                <option value="date">Sort by Date</option>
                <option value="miles">Sort by Miles</option>
                <option value="rating">Sort by Rating</option>
            </select>
        </section>

        <section class="hikes-list" id="hikesList"></section>
    </div>

    <div class="modal" id="hikeModal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle">Add Hike</h2>
            <form id="hikeForm">
                <input type="hidden" id="hikeId">
                
                <div class="form-row">
                    <label>Trail Name *</label>
                    <input type="text" id="trailName" required>
                </div>
                
                <div class="form-row">
                    <label>Location</label>
                    <input type="text" id="location">
                </div>
                
                <div class="form-row">
                    <label>Date *</label>
                    <input type="date" id="date" required>
                </div>
                
                <div class="form-row-group">
                    <div class="form-row">
                        <label>Distance (miles)</label>
                        <input type="number" step="0.1" id="distance">
                    </div>
                    <div class="form-row">
                        <label>Elevation (ft)</label>
                        <input type="number" id="elevation">
                    </div>
                </div>
                
                <div class="form-row-group">
                    <div class="form-row">
                        <label>Duration</label>
                        <input type="text" id="duration" placeholder="e.g., 2h 30m">
                    </div>
                    <div class="form-row">
                        <label>Difficulty</label>
                        <select id="difficulty">
                            <option value="Easy">Easy</option>
                            <option value="Moderate">Moderate</option>
                            <option value="Hard">Hard</option>
                            <option value="Expert">Expert</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <label>Weather</label>
                    <input type="text" id="weather" placeholder="e.g., Sunny, 65°F">
                </div>
                
                <div class="form-row">
                    <label>Rating</label>
                    <div class="rating-input">
                        <input type="radio" name="rating" value="1"><label>⭐</label>
                        <input type="radio" name="rating" value="2"><label>⭐⭐</label>
                        <input type="radio" name="rating" value="3"><label>⭐⭐⭐</label>
                        <input type="radio" name="rating" value="4"><label>⭐⭐⭐⭐</label>
                        <input type="radio" name="rating" value="5" checked><label>⭐⭐⭐⭐⭐</label>
                    </div>
                </div>
                
                <div class="form-row">
                    <label>Gear</label>
                    <textarea id="gear" rows="2" placeholder="Boots, pack, water..."></textarea>
                </div>
                
                <div class="form-row">
                    <label>Notes</label>
                    <textarea id="notes" rows="3" placeholder="Trail conditions, wildlife, etc."></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary">Save Hike</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
